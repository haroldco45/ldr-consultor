<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LDR Luis Del Rio Consultor</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+SC:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0a0a0a; --bg2:#111111; --white:#f4f1ec; --accent:#c8a96e; --green:#4caf80;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;overflow-x:hidden}

    /* HERO - Imagen Clara sin filtros oscuros */
    .hero{position:relative;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .hero-bg{
        position:absolute;inset:0;
        background-image:url('foto1.jpeg'); /* Ruta para WhatsApp Image 2026-05-14 at 9.06.53 AM.jpeg */
        background-size:cover;
        background-position:center 30%;
    }
    /* Gradiente sutil solo en la base para lectura del texto */
    .hero-bg::after{
        content:'';position:absolute;inset:0;
        background:linear-gradient(180deg, rgba(10,10,10,0) 60%, rgba(10,10,10,0.85) 100%);
    }

    .hero-nav{position:relative;z-index:10;padding:28px 24px;display:flex;justify-content:center;}
    .logo-ldr{font-family:'Cormorant SC',serif;font-size:2.6rem;font-weight:700;letter-spacing:0.18em;color:var(--white);}
    
    .hero-content{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 24px 48px}
    .hero-title{font-family:'Bebas Neue',sans-serif;font-size:4rem;line-height:0.95;letter-spacing:0.02em;}
    .hero-title span{color:var(--accent)}
    .btn-primary{padding:13px 26px;background:var(--accent);border:none;border-radius:4px;color:var(--bg);font-weight:600;text-transform:uppercase;text-decoration:none;display:inline-block;margin-top:20px;}

    /* SECCIÓN AMBIENTAL - Colores vibrantes */
    .amb-sec{background:var(--bg2);padding-bottom:50px;}
    .amb-img-wrap{position:relative;height:250px;width:100%;overflow:hidden;}
    .amb-img{width:100%;height:100%;object-fit:cover;}
    .amb-img-ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 70%,var(--bg2) 100%);}
    .amb-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:0.95;padding:20px 24px;}
    .amb-title .g{color:var(--green)}
    .car-tag{display:inline-block;margin:18px 24px;padding:7px 13px;background:rgba(76,175,128,0.09);border:1px solid rgba(76,175,128,0.28);border-radius:20px;font-size:0.62rem;color:var(--green);text-transform:uppercase;}

    footer{padding:30px 24px;text-align:center;border-top:1px solid rgba(244,241,236,0.08);font-size:0.7rem;opacity:0.6;}
    footer a{color:var(--accent);text-decoration:none;}
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <nav class="hero-nav">
    <div class="logo-ldr">LDR</div>
  </nav>
  <div class="hero-content">
    <h1 class="hero-title">CONSTRUIMOS<br><span>TU VISIÓN</span></h1>
    <a href="https://wa.me/573145959767" class="btn-primary" target="_blank">Contactar</a>
  </div>
</section>

<section class="amb-sec">
  <div class="amb-img-wrap">
    <!-- Ruta para WhatsApp Image 2026-05-14 at 9.06.53 AM (1).jpeg -->
    <img class="amb-img" src="foto2.jpeg" alt="Ambiental"/>
    <div class="amb-img-ov"></div>
  </div>
  <div class="amb-title">SOLUCIONES<br>AMBIENTALES<br><span class="g">INTEGRALES</span></div>
  <div class="car-tag">🌿 Certificado ante la CAR</div>
</section>

<footer>
  <p>Desarrollada por <a href="https://wa.me/573117700431">Vibras Positivas HM</a></p>
</footer>

<script>
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
